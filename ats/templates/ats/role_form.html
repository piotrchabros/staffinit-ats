{% extends "ats/base.html" %}
{% block title %}New role — StaffInit ATS{% endblock %}
{% block content %}
  <h1>New role</h1>
  <div class="card" style="max-width:640px">
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<div class="muted" style="color:#b00">{{ field.errors|join:", " }}</div>{% endif %}
      {% endfor %}
      <div style="margin-top:1rem">
        <button type="submit">Create role</button>
        <a class="btn secondary" href="{% url 'role_list' %}">Cancel</a>
      </div>
    </form>
  </div>
{% endblock %}
