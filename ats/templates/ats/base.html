{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}StaffInit ATS{% endblock %}</title>
  <style>
    :root { --line:#e2e2e2; --muted:#666; --bg:#fafafa; }
    * { box-sizing: border-box; }
    body { font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
           color:#1a1a1a; margin:0; background:var(--bg); }
    header { display:flex; align-items:center; gap:1rem; padding:.75rem 1.25rem;
             background:#fff; border-bottom:1px solid var(--line); }
    header a { color:#1a1a1a; text-decoration:none; font-weight:600; }
    header .spacer { flex:1; }
    main { max-width: 1000px; margin: 1.5rem auto; padding: 0 1.25rem; }
    h1 { font-size:1.4rem; margin:.2rem 0 1rem; }
    table { width:100%; border-collapse:collapse; background:#fff; }
    th, td { text-align:left; padding:.5rem .65rem; border-bottom:1px solid var(--line); vertical-align:top; }
    th { font-size:.8rem; text-transform:uppercase; letter-spacing:.03em; color:var(--muted); }
    .muted { color:var(--muted); }
    .chip { display:inline-block; font-size:.75rem; padding:.1rem .5rem; border-radius:999px; border:1px solid var(--line); }
    .chip.scored { background:#e7f6ec; border-color:#bfe3cc; }
    .chip.pending { background:#fff6e5; border-color:#f0dca8; }
    .chip.failed { background:#fdecec; border-color:#f3c2c2; }
    .card { background:#fff; border:1px solid var(--line); border-radius:8px; padding:1rem 1.1rem; margin-bottom:1.1rem; }
    input[type=text], input[type=email], textarea, select {
      width:100%; padding:.45rem .55rem; border:1px solid var(--line); border-radius:6px; font:inherit; }
    button, .btn { font:inherit; padding:.4rem .8rem; border:1px solid #1a1a1a; background:#1a1a1a;
                   color:#fff; border-radius:6px; cursor:pointer; text-decoration:none; display:inline-block; }
    button.secondary, .btn.secondary { background:#fff; color:#1a1a1a; }
    .messages { list-style:none; padding:0; margin:0 0 1rem; }
    .messages li { padding:.5rem .75rem; border-radius:6px; margin-bottom:.4rem; border:1px solid var(--line); background:#fff; }
    .messages li.error { background:#fdecec; border-color:#f3c2c2; }
    .messages li.warning { background:#fff6e5; border-color:#f0dca8; }
    .messages li.success { background:#e7f6ec; border-color:#bfe3cc; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    details summary { cursor:pointer; color:var(--muted); }
    label { font-size:.85rem; color:var(--muted); display:block; margin:.4rem 0 .15rem; }
  </style>
</head>
<body>
  <header>
    <a href="{% url 'role_list' %}">StaffInit ATS</a>
    <span class="spacer"></span>
    {% if user.is_authenticated %}
      <span class="muted">{{ user.get_username }}</span>
      <form method="post" action="{% url 'logout' %}" style="margin:0">{% csrf_token %}
        <button class="secondary" type="submit">Log out</button>
      </form>
    {% endif %}
  </header>
  <main>
    {% if messages %}
      <ul class="messages">
        {% for m in messages %}<li class="{{ m.tags }}">{{ m }}</li>{% endfor %}
      </ul>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
